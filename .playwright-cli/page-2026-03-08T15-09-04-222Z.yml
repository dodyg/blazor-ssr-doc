  - text: "# Blazor SSR Documentation > A curated, static documentation site focused exclusively on **Blazor Server-Side Rendering (SSR)** extracted from the official ASP.NET Core documentation. ## Overview This project extracts, filters, and organizes documentation specifically for Blazor SSR (also known as static rendering) from the Microsoft ASP.NET Core documentation. The site is built using [Lunet](https://github.com/lunet-io/lunet), a fast, modular static website generator for .NET. ## What's Included - âœ… **Blazor SSR Concepts**: Static and Interactive Server-Side Rendering - âœ… **Render Modes**: Complete guide to Static Server, Interactive Server, and Auto modes - âœ… **Component Fundamentals**: Lifecycle, rendering, and data flow in SSR contexts - âœ… **Prerendering**: Optimization techniques for initial load performance - âœ… **Security**: Authentication and authorization for SSR - âœ… **Deployment**: Best practices for deploying Blazor SSR apps ## What's NOT Included To maintain focus on SSR, the following topics are excluded: - â\x9dŒ Blazor WebAssembly standalone apps - â\x9dŒ Progressive Web Apps (PWA) - â\x9dŒ Blazor Hybrid (.NET MAUI, WPF, Windows Forms) - â\x9dŒ WebAssembly-specific features (AOT, native dependencies) - â\x9dŒ Client-side offline scenarios ## Quick Start ### Prerequisites - [.NET 8.0 SDK](https://dotnet.microsoft.com/download/dotnet/8.0) or later - Git (for cloning the source repository) ### Setup 1. **Clone this repository** ```bash git clone"
  - generic [ref=e2]:
    - text: "cd blazor-ssr-docs ``` 2. **Install Lunet** ```bash dotnet tool install --global lunet ``` 3. **Initialize the site** (if not already done) ```bash lunet init ``` 4. **Build the site** ```bash lunet build ``` 5. **Serve locally** ```bash lunet serve ``` Open http://localhost:4000 in your browser. ## Project Structure ``` blazor-ssr-docs/ â”œâ”€â”€ config.scriban # Lunet configuration â”œâ”€â”€ content/ # Markdown documentation â”‚ â”œâ”€â”€ index.md # Homepage â”‚ â”œâ”€â”€ getting-started/ # Getting started guides â”‚ â”œâ”€â”€ fundamentals/ # Core SSR concepts â”‚ â”œâ”€â”€ components/ # Component documentation â”‚ â”œâ”€â”€ render-modes/ # Render mode details â”‚ â””â”€â”€ advanced/ # Advanced topics â”œâ”€â”€ layouts/ # Page layout templates â”œâ”€â”€ includes/ # Reusable partials â”œâ”€â”€ assets/ # CSS, JS, images â”œâ”€â”€ scripts/ # Extraction utilities â”œâ”€â”€ PLAN.md # Detailed project plan â””â”€â”€ README.md # This file ``` ## Content Extraction The documentation is extracted from the [official ASP.NET Core Docs repository](https://github.com/dotnet/AspNetCore.Docs). ### Automated Extraction Run the extraction script to pull content from the source: ```bash # Clone source repository (one-time) git clone --depth 1 https://github.com/dotnet/AspNetCore.Docs.git temp-docs # Run extraction script ./scripts/extract-ssr-content.sh # Clean up rm -rf temp-docs ``` ### Manual Extraction See [PLAN.md](PLAN.md) for detailed information on which files to extract and how to process them. ## Development ### Adding New Content 1. Create a new markdown file in the appropriate `content/` subdirectory 2. Add frontmatter with title, description, and other metadata 3. Write content in Markdown 4. Build and test locally ### Updating Content 1. Update the source content in `content/` 2. Rebuild: `lunet build` 3. Test: `lunet serve` ### Customizing Layouts Edit templates in `layouts/` directory: - `_default.scriban` - Base layout - `page.scriban` - Standard page layout - `index.scriban` - Homepage layout ## Building for Production ```bash lunet build ``` The generated site will be in `.lunet/build/www/`. ## Deployment ### GitHub Pages ```bash # Build the site lunet build # Deploy to gh-pages branch cd .lunet/build/www git init git add . git commit -m \"Deploy documentation\" git push -f git@github.com:"
    - generic [ref=e3]: "/.git master:gh-pages ``` ### Azure Static Web Apps 1. Connect your repository to Azure Static Web Apps 2. Set build command: `lunet build` 3. Set output directory: `.lunet/build/www` ### Netlify/Vercel 1. Connect repository 2. Build command: `lunet build` 3. Publish directory: `.lunet/build/www` ## Contributing This is an extracted subset of the official documentation. For contributions to the source documentation, please submit PRs to the [AspNetCore.Docs repository](https://github.com/dotnet/AspNetCore.Docs). For improvements to this extraction/organization: 1. Fork this repository 2. Create a feature branch 3. Submit a pull request ## License The documentation content is sourced from the [ASP.NET Core Docs](https://github.com/dotnet/AspNetCore.Docs) and is subject to its license (Creative Commons Attribution 4.0 International Public License). The project structure, scripts, and Lunet configuration are provided under the MIT License. ## Credits - **Documentation Source**: [Microsoft ASP.NET Core Documentation](https://learn.microsoft.com/aspnet/core/blazor) - **Static Site Generator**: [Lunet](https://lunet.io) by Alexandre Mutel - **Template Engine**: [Scriban](https://github.com/scriban/scriban) ## References - [Blazor Documentation](https://learn.microsoft.com/aspnet/core/blazor) - [Lunet Documentation](https://lunet.io) - [ASP.NET Core Docs Source](https://github.com/dotnet/AspNetCore.Docs) --- **Note**: This is an unofficial, community-maintained extraction focused specifically on Blazor SSR. For the complete, official Blazor documentation covering all hosting models, visit the [Microsoft Learn site](https://learn.microsoft.com/aspnet/core/blazor)."