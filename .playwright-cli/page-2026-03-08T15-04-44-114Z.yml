  - heading "Custom event arguments" [level=2] [ref=e173]
  - paragraph [ref=e174]: Blazor supports custom event arguments, which enable you to pass arbitrary data to .NET event handlers with custom events.
  - heading "General configuration" [level=3] [ref=e175]
  - paragraph [ref=e176]: Custom events with custom event arguments are generally enabled with the following steps.
  - paragraph [ref=e177]: "In JavaScript, define a function for building the custom event argument object from the source event:"
  - code [ref=e179]: "function eventArgsCreator(event) { return { customProperty1: 'any value for property 1', customProperty2: event.srcElement.id }; }"
  - paragraph [ref=e180]:
    - text: The
    - code [ref=e181]: event
    - text: parameter is a
    - link "DOM Event" [ref=e182] [cursor=pointer]:
      - /url: https://developer.mozilla.org/docs/Web/API/Event
    - text: .
  - paragraph [ref=e183]:
    - text: Register the custom event with the preceding handler in a
    - link "JavaScript initializer" [ref=e184] [cursor=pointer]:
      - /url: ""
    - text: . Provide the appropriate browser event name to
    - code [ref=e185]: browserEventName
    - text: ", which for the example shown in this section is"
    - code [ref=e186]: click
    - text: for a button selection in the UI.
  - paragraph [ref=e187]:
    - code [ref=e188]: "wwwroot/{PACKAGE ID/ASSEMBLY NAME}.lib.module.js"
    - text: (the
    - code [ref=e189]: "{PACKAGE ID/ASSEMBLY NAME}"
    - text: "placeholder is the package ID or assembly name of the app):"
  - paragraph [ref=e190]: "For a Blazor Web App:"
  - code [ref=e192]: "export function afterWebStarted(blazor) { blazor.registerCustomEventType('customevent', { browserEventName: 'click', createEventArgs: eventArgsCreator }); }"
  - paragraph [ref=e193]: "For a Blazor Server or Blazor WebAssembly app:"
  - code [ref=e195]: "export function afterStarted(blazor) { blazor.registerCustomEventType('customevent', { browserEventName: 'click', createEventArgs: eventArgsCreator }); }"
  - paragraph [ref=e196]:
    - text: The call to
    - code [ref=e197]: registerCustomEventType
    - text: is performed in a script only once per event.
