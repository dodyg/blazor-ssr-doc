  - heading "Custom clipboard paste event example" [level=3] [ref=e246]
  - paragraph [ref=e247]: The following example receives a custom clipboard paste event that includes the time of the paste and the user's pasted text.
  - paragraph [ref=e248]:
    - text: Declare a custom name (
    - code [ref=e249]: oncustompaste
    - text: ) for the event and a .NET class (
    - code [ref=e250]: CustomPasteEventArgs
    - text: ") to hold the event arguments for this event:"
  - paragraph [ref=e251]:
    - code [ref=e252]: CustomEvents.cs
    - text: ":"
  - code [ref=e254]: "using Microsoft.AspNetCore.Components; namespace BlazorSample.CustomEvents; [EventHandler(\"oncustompaste\", typeof(CustomPasteEventArgs), enableStopPropagation: true, enablePreventDefault: true)] public static class EventHandlers { } public class CustomPasteEventArgs : EventArgs { public DateTime EventTimestamp { get; set; } public string? PastedData { get; set; } }"
  - paragraph [ref=e255]:
    - text: Add JavaScript code to supply data for the
    - link "System.EventArgs" [ref=e256] [cursor=pointer]:
      - /url: https://docs.microsoft.com/en-us/dotnet/api/System.EventArgs
    - text: subclass with the preceding handler in a
    - link "JavaScript initializer" [ref=e257] [cursor=pointer]:
      - /url: ""
    - text: . The following example only handles pasting text, but you could use arbitrary JavaScript APIs to deal with users pasting other types of data, such as images.
  - paragraph [ref=e258]:
    - code [ref=e259]: "wwwroot/{PACKAGE ID/ASSEMBLY NAME}.lib.module.js"
    - text: ":"
  - paragraph [ref=e260]: "For a Blazor Web App:"
  - code [ref=e262]: "export function afterWebStarted(blazor) { blazor.registerCustomEventType('custompaste', { browserEventName: 'paste', createEventArgs: event => { return { eventTimestamp: new Date(), pastedData: event.clipboardData.getData('text') }; } }); }"
  - paragraph [ref=e263]: "For a Blazor Server or Blazor WebAssembly app:"
  - code [ref=e265]: "export function afterStarted(blazor) { blazor.registerCustomEventType('custompaste', { browserEventName: 'paste', createEventArgs: event => { return { eventTimestamp: new Date(), pastedData: event.clipboardData.getData('text') }; } }); }"
