      - heading "Handle incomplete asynchronous actions at render" [level=2] [ref=e319]
      - paragraph [ref=e320]:
        - text: Asynchronous actions performed in lifecycle events might not have completed before the component is rendered. Objects might be
        - code [ref=e321]: "null"
        - text: or incompletely populated with data while the lifecycle method is executing. Provide rendering logic to confirm that objects are initialized. Render placeholder UI elements (for example, a loading message) while objects are
        - code [ref=e322]: "null"
        - text: .
      - paragraph [ref=e323]:
        - text: In the following
        - code [ref=e324]: Slow
        - text: component,
        - link "Microsoft.AspNetCore.Components.ComponentBase.OnInitializedAsync*" [ref=e325] [cursor=pointer]:
          - /url: https://docs.microsoft.com/en-us/dotnet/api/Microsoft.AspNetCore.Components.ComponentBase.OnInitializedAsync
        - text: is overridden to asynchronously execute a long-running task. While
