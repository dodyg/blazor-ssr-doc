        - heading "Cancelable background work" [level=2] [ref=e427]
        - paragraph [ref=e428]:
          - text: Components often perform long-running background work, such as making network calls (
          - link "System.Net.Http.HttpClient" [ref=e429] [cursor=pointer]:
            - /url: https://docs.microsoft.com/en-us/dotnet/api/System.Net.Http.HttpClient
          - text: ) and interacting with databases. It's desirable to stop the background work to conserve system resources in several situations. For example, background asynchronous operations don't automatically stop when a user navigates away from a component.
        - paragraph [ref=e430]: "Other reasons why background work items might require cancellation include:"
        - list [ref=e431]:
          - listitem [ref=e432]: An executing background task was started with faulty input data or processing parameters.
          - listitem [ref=e433]: The current set of executing background work items must be replaced with a new set of work items.
          - listitem [ref=e434]: The priority of currently executing tasks must be changed.
          - listitem [ref=e435]: The app must be shut down for server redeployment.
          - listitem [ref=e436]: Server resources become limited, necessitating the rescheduling of background work items.
        - paragraph [ref=e437]: "To implement a cancelable background work pattern in a component:"
        - list [ref=e438]:
          - listitem [ref=e439]:
            - text: Use a
            - link "System.Threading.CancellationTokenSource" [ref=e440] [cursor=pointer]:
              - /url: https://docs.microsoft.com/en-us/dotnet/api/System.Threading.CancellationTokenSource
            - text: and
            - link "System.Threading.CancellationToken" [ref=e441] [cursor=pointer]:
              - /url: https://docs.microsoft.com/en-us/dotnet/api/System.Threading.CancellationToken
            - text: .
          - listitem [ref=e442]:
            - text: Upon
            - link "disposal of the component" [ref=e443] [cursor=pointer]:
              - /url: ""
            - text: and at any point cancellation is desired by manually canceling the token, call
            - link "CancellationTokenSource.Cancel" [ref=e444] [cursor=pointer]:
              - /url: https://docs.microsoft.com/en-us/dotnet/api/System.Threading.CancellationTokenSource.Cancel
              - code [ref=e445]: CancellationTokenSource.Cancel
            - text: to signal that the background work should be cancelled.
          - listitem [ref=e446]:
            - text: After the asynchronous call returns, call
            - link "System.Threading.CancellationToken.ThrowIfCancellationRequested*" [ref=e447] [cursor=pointer]:
              - /url: https://docs.microsoft.com/en-us/dotnet/api/System.Threading.CancellationToken.ThrowIfCancellationRequested
            - text: on the token.
