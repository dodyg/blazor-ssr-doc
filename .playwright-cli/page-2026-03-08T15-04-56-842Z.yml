        - code [ref=e346]: Home
        - text: "component:"
      - code [ref=e348]: "@page \"/\" <PageTitle>Home</PageTitle> <h1>Hello, world!</h1> Welcome to your new app. <Slow />"
      - blockquote [ref=e349]:
        - paragraph [ref=e350]:
          - text: "[!NOTE] Although the examples in this section discuss the"
          - link "Microsoft.AspNetCore.Components.ComponentBase.OnInitializedAsync*" [ref=e351] [cursor=pointer]:
            - /url: https://docs.microsoft.com/en-us/dotnet/api/Microsoft.AspNetCore.Components.ComponentBase.OnInitializedAsync
          - text: lifecycle method, other lifecycle methods that execute during prerendering may delay final rendering of a component. Only
          - 'link "OnAfterRender{Async}" [ref=e352] [cursor=pointer]':
            - /url: "#after-component-render-onafterrenderasync"
            - code [ref=e353]: "OnAfterRender{Async}"
          - text: isn't executed during prerendering and is immune to delays due to quiescence.
      - paragraph [ref=e354]:
        - text: During prerendering, the
        - code [ref=e355]: Home
        - text: component doesn't render until the
        - code [ref=e356]: Slow
        - text: component is rendered, which takes ten seconds. The UI is blank during this ten-second period, and there's no loading message. After prerendering, the
        - code [ref=e357]: Home
        - text: component renders, and the
        - code [ref=e358]: Slow
        - text: component's loading message is displayed. After ten more seconds, the
        - code [ref=e359]: Slow
        - text: component finally displays the finished message.
      - paragraph [ref=e360]:
        - text: As the preceding demonstration illustrates, quiescence during prerendering results in a poor user experience. To improve the user experience, begin by implementing
        - link "streaming rendering" [ref=e361] [cursor=pointer]:
          - /url: ""
        - text: to avoid waiting for the asynchronous task to complete while prerendering.
      - paragraph [ref=e362]:
        - text: Add the
        - link "[StreamRendering] attribute" [ref=e363] [cursor=pointer]:
          - /url: https://docs.microsoft.com/en-us/dotnet/api/Microsoft.AspNetCore.Components.StreamRenderingAttribute
          - code [ref=e364]: "[StreamRendering]"
          - text: attribute
        - text: to the
        - code [ref=e365]: Slow
        - text: component (use
        - code [ref=e366]: "[StreamRendering(true)]"
        - text: "in .NET 8):"
      - code [ref=e368]: "@attribute [StreamRendering]"
      - paragraph [ref=e369]:
        - text: When the
        - code [ref=e370]: Home
        - text: component is prerendering, the
        - code [ref=e371]: Slow
        - text: component is quickly rendered with its loading message. The
        - code [ref=e372]: Home
        - text: component doesn't wait for ten seconds for the
        - code [ref=e373]: Slow
        - text: component to finish rendering. However, the finished message displayed at the end of prerendering is replaced by the loading message while the component finally renders, which is another ten-second delay. This occurs because the
        - code [ref=e374]: Slow
        - text: component is rendering twice, along with
        - code [ref=e375]: LoadDataAsync
        - text: executing twice. When a component is accessing resources, such as services and databases, double execution of service calls and database queries creates undesirable load on the app's resources.
      - paragraph [ref=e376]:
        - text: To address the double rendering of the loading message and the re-execution of service and database calls, persist prerendered state with
        - link "Microsoft.AspNetCore.Components.PersistentComponentState" [ref=e377] [cursor=pointer]:
          - /url: https://docs.microsoft.com/en-us/dotnet/api/Microsoft.AspNetCore.Components.PersistentComponentState
        - text: for final rendering of the component, as seen in the following updates to the
        - code [ref=e378]: Slow
        - text: "component:"
      - code [ref=e380]: "@page \"/slow\" @attribute [StreamRendering] <h2>Slow Component</h2> @if (Data is null) { <div><em>Loading...</em></div> } else { <div>@Data</div> } @code { [PersistentState] public string? Data { get; set; } protected override async Task OnInitializedAsync() { Data ??= await LoadDataAsync(); } private async Task<string> LoadDataAsync() { await Task.Delay(5000); return \"Finished!\"; } }"
      - code [ref=e382]: "@page \"/slow\" @attribute [StreamRendering] @implements IDisposable @inject PersistentComponentState ApplicationState <h2>Slow Component</h2> @if (data is null) { <div><em>Loading...</em></div> } else { <div>@data</div> } @code { private string? data; private PersistingComponentStateSubscription persistingSubscription; protected override async Task OnInitializedAsync() { if (!ApplicationState.TryTakeFromJson<string>(nameof(data), out var restored)) { data = await LoadDataAsync(); } else { data = restored!; } // Call at the end to avoid a potential race condition at app shutdown persistingSubscription = ApplicationState.RegisterOnPersisting(PersistData); } private Task PersistData() { ApplicationState.PersistAsJson(nameof(data), data); return Task.CompletedTask; } private async Task<string> LoadDataAsync() { await Task.Delay(5000); return \"Finished!\"; } void IDisposable.Dispose() { persistingSubscription.Dispose(); } }"
      - paragraph [ref=e383]: "By combining streaming rendering with persistent component state:"
      - list [ref=e384]:
        - listitem [ref=e385]: Services and databases only require a single call for component initialization.
        - listitem [ref=e386]: Components render their UIs quickly with loading messages during long-running tasks for the best user experience.
