      - code [ref=e341]: "@if (movies == null) { <p><em>Loading...</em></p> } else { @* display movies *@ } @code { private Movies[]? movies; protected override async Task OnInitializedAsync() { movies = await GetMovies(); } }"
      - paragraph [ref=e342]:
        - text: Prerendering waits for
        - emphasis [ref=e343]: quiescence
        - text: ", which means that a component doesn't render until all of the components in the render tree have finished rendering. This means that a loading message doesn't display while a child component's"
        - link "Microsoft.AspNetCore.Components.ComponentBase.OnInitializedAsync*" [ref=e344] [cursor=pointer]:
