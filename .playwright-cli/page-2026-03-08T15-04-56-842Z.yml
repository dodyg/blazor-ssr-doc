        - text: ", a loading message is displayed to the user. After the"
        - code [ref=e328]: Task
        - text: returned by
        - link "Microsoft.AspNetCore.Components.ComponentBase.OnInitializedAsync*" [ref=e329] [cursor=pointer]:
          - /url: https://docs.microsoft.com/en-us/dotnet/api/Microsoft.AspNetCore.Components.ComponentBase.OnInitializedAsync
        - text: completes, the component is rerendered with the updated state, showing the "
        - code [ref=e330]: Finished!
        - text: "\" message."
      - paragraph [ref=e331]:
