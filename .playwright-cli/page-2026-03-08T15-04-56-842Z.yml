      - code [ref=e334]: "@page \"/slow\" <h2>Slow Component</h2> @if (isLoading) { <div><em>Loading...</em></div> } else { <div>Finished!</div> } @code { private bool isLoading = true; protected override async Task OnInitializedAsync() { await LoadDataAsync(); isLoading = false; } private Task LoadDataAsync() { return Task.Delay(10000); } }"
      - paragraph [ref=e335]:
        - text: The preceding component uses an
        - code [ref=e336]: isLoading
        - text: variable to display the loading message. A similar approach is used for a component that loads data into a collection and checks if the collection is
