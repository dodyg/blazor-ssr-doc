      - heading "Stateful reconnection after prerendering" [level=2] [ref=e393]
      - paragraph [ref=e394]:
        - text: When prerendering on the server, a component is initially rendered statically as part of the page. Once the browser establishes a SignalR connection back to the server, the component is rendered
