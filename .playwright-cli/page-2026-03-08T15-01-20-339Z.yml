      - text: with
      - link "static server-side rendering (static SSR)" [ref=e46] [cursor=pointer]:
        - /url: /fundamentals/render-modes
      - text: or prerendering to stream content updates on the response stream and improve the user experience for components that perform long-running asynchronous tasks to fully render.
    - paragraph [ref=e47]: For example, consider a component that makes a long-running database query or web API call to render data when the page loads. Normally, asynchronous tasks executed as part of rendering a server-side component must complete before the rendered response is sent, which can delay loading the page. Any significant delay in rendering the page harms the user experience. To improve the user experience, streaming rendering initially renders the entire page quickly with placeholder content while asynchronous operations execute. After the operations are complete, the updated content is sent to the client on the same response connection and patched into the DOM.
    - paragraph [ref=e48]: Streaming rendering requires the server to avoid buffering the output. The response data must flow to the client as the data is generated. For hosts that enforce buffering, streaming rendering degrades gracefully, and the page loads without streaming rendering.
    - paragraph [ref=e49]:
      - text: To stream content updates when using static server-side rendering (static SSR) or prerendering, apply the
      - link "[StreamRendering] attribute" [ref=e50] [cursor=pointer]:
