        - code [ref=e51]: "[StreamRendering]"
        - text: attribute
      - text: in .NET 9 or later (use
      - code [ref=e52]: "[StreamRendering(true)]"
      - text: in .NET 8) to the component. Streaming rendering must be explicitly enabled because streamed updates may cause content on the page to shift. Components without the attribute automatically adopt streaming rendering if the parent component uses the feature. Pass
      - code [ref=e53]: "false"
      - text: to the attribute in a child component to disable the feature at that point and further down the component subtree. The attribute is functional when applied to components supplied by a
      - link "Razor class library" [ref=e54] [cursor=pointer]:
        - /url: ""
      - text: .
